<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge Account</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.deposit-box{
    background:#eef7ff;
    border:1px solid #bcdcff;
    padding:15px;
    border-radius:8px;
    text-align:center;
    margin-bottom:20px;
}

.deposit-number{
    font-size:24px;
    font-weight:bold;
    color:#0066cc;
    margin-top:10px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.notice{
    margin-top:15px;
    text-align:center;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

    <h2>Recharge Account</h2>

    <div class="deposit-box">
        <p>Send your Mobile Money deposit to:</p>

        <div class="deposit-number">
            +256 780 194 414
        </div>

        <p>
            After sending the money, enter the details below.
            Deposits will be reviewed by the administrator.
        </p>
    </div>

    <form id="depositForm">

        <input
            type="text"
            id="phone"
            placeholder="Phone Number Used"
            required
        >

        <input
            type="number"
            id="amount"
            placeholder="Amount Sent"
            required
        >

        <input
            type="text"
            id="transactionId"
            placeholder="Transaction ID"
            required
        >

        <button type="submit">
            Submit Deposit
        </button>

    </form>

    <div class="notice">
        Status: Pending Admin Verification
    </div>

</div>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

document.getElementById("depositForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const depositData = {
        phone: document.getElementById("phone").value,
        amount: document.getElementById("amount").value,
        transaction_id: document.getElementById("transactionId").value,
        status: "pending"
    };

    const res = await fetch(SUPABASE_URL + "/rest/v1/deposits", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=representation"
        },
        body: JSON.stringify(depositData)
    });

    if (res.ok) {
        alert("Deposit submitted! Waiting admin approval.");
        document.getElementById("depositForm").reset();
    } else {
        alert("Error submitting deposit");
    }
});
</script>

</body>
</html>
