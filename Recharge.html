<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge - EXPO INVESTMENT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:white;
padding:15px;
display:flex;
align-items:center;
border-bottom:1px solid #e5e7eb;
}

.header a{
text-decoration:none;
font-size:22px;
margin-right:10px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

.balance{
background:#10b981;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
}

.balance h2{
font-size:30px;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:8px;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
font-weight:600;
margin-top:15px;
cursor:pointer;
}

.info{
background:#eff6ff;
padding:12px;
border-radius:8px;
font-size:13px;
color:#1d4ed8;
}
</style>
</head>

<body>

<div class="header">
<a href="home.html">←</a>
<h3>Recharge</h3>
</div>

<div class="container">

<div class="balance">
<h2 id="balance">UGX 0</h2>
<p>Current Balance</p>
</div>

<div class="card">

<div class="info">
Deposit money into your account.
</div>

<input
type="number"
id="amount"
placeholder="Enter amount">

<button onclick="recharge()">
Recharge Now
</button>

</div>

</div>

<script>

if(!localStorage.getItem('isLoggedIn')){
window.location.href='index.html';
}

const user =
JSON.parse(localStorage.getItem('user')||'{}');

const userId =
user.email || 'guest';

const balanceKey =
'balance_' + userId;

const txnKey =
'transactions_' + userId;

function loadBalance(){

const balance =
Number(localStorage.getItem(balanceKey)||0);

document.getElementById('balance')
.textContent =
'UGX ' +
new Intl.NumberFormat().format(balance);

}

function recharge(){

const amount =
Number(
document.getElementById('amount').value
);

if(amount <= 0){
alert('Enter valid amount');
return;
}

let balance =
Number(
localStorage.getItem(balanceKey)||0
);

balance += amount;

localStorage.setItem(
balanceKey,
balance
);

let transactions =
JSON.parse(
localStorage.getItem(txnKey)||'[]'
);

transactions.push({
id:Date.now(),
type:'recharge',
amount:amount,
description:'Account Recharge',
date:new Date().toLocaleString()
});

localStorage.setItem(
txnKey,
JSON.stringify(transactions)
);

alert(
'Recharge successful'
);

document.getElementById('amount').value='';

loadBalance();
}

loadBalance();

</script>

</body>
</html>
