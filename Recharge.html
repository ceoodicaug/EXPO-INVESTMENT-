<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Recharge System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- EmailJS --><script src="https://cdn.emailjs.com/dist/email.min.js"></script><script>
  (function () {
    emailjs.init("qjrNHO8L0vGNPqs2o");
  })();
</script><style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 420px;
    margin: 60px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #218838;
}

.status {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}
</style></head><body><div class="container">
    <h2>Recharge Account</h2><form id="rechargeForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="number" id="amount" placeholder="Enter Amount" required>
    <button type="submit">Deposit Now</button>
</form>

<div class="status" id="status"></div>

</div><script>
document.getElementById("rechargeForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const status = document.getElementById("status");
    status.innerText = "Processing...";

    emailjs.send("service_e7ese5b", "template_vxbms7f", {
        user_name: document.getElementById("name").value,
        user_email: document.getElementById("email").value,
        amount: document.getElementById("amount").value
    })
    .then(function () {
        status.innerText = "Deposit request sent successfully!";
        status.style.color = "green";
        document.getElementById("rechargeForm").reset();
    })
    .catch(function (error) {
        console.log(error);
        status.innerText = "Failed to send. Try again.";
        status.style.color = "red";
    });
});
</script></body>
</html>
