<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge Account</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.deposit-box{
    background:#eef7ff;
    border:1px solid #bcdcff;
    padding:15px;
    border-radius:8px;
    text-align:center;
    margin-bottom:20px;
}

.deposit-number{
    font-size:24px;
    font-weight:bold;
    color:#0066cc;
    margin-top:10px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.notice{
    margin-top:15px;
    text-align:center;
    color:#666;
}
</style>
</head>
<body>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

document.getElementById("depositForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const depositData = {
        phone: document.getElementById("phone").value,
        amount: Number(document.getElementById("amount").value),
        transaction_id: document.getElementById("transactionId").value,
        status: "pending"
    };

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/deposits`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "Prefer": "return=representation"
            },
            body: JSON.stringify(depositData)
        });

        const data = await response.json();

        if (!response.ok) {
            console.error(data);
            alert("Error submitting deposit: " + (data.message || "Unknown error"));
            return;
        }

        alert("Deposit submitted successfully! Waiting admin approval.");
        document.getElementById("depositForm").reset();

    } catch (error) {
        console.error(error);
        alert("Network error. Check your Supabase setup.");
    }
});
</script>

</body>
</html>
