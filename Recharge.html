<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit - Recharge Account</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 450px;
    width: 100%;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 30px 20px;
    text-align: center;
  }

  .header h1 {
    font-size: 28px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .header p {
    font-size: 14px;
    opacity: 0.9;
  }

  .content {
    padding: 30px 20px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.3s ease;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .form-group input::placeholder {
    color: #999;
  }

  .input-icon {
    position: relative;
  }

  .input-icon::before {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
  }

  .input-icon input {
    padding-left: 48px;
  }

  .amount-input::before {
    content: "💰";
  }

  .phone-input::before {
    content: "📱";
  }

  .method-input::before {
    content: "💳";
  }

  .info-box {
    background: #f0f4ff;
    border-left: 4px solid #667eea;
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }

  .button-group {
    display: flex;
    gap: 12px;
  }

  .btn {
    flex: 1;
    padding: 14px 24px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    background: #f0f0f0;
    color: #333;
  }

  .btn-secondary:hover {
    background: #e0e0e0;
  }

  .error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }

  .success {
    color: #16a34a;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }

  .footer {
    background: #f9f9f9;
    padding: 16px 20px;
    text-align: center;
    font-size: 12px;
    color: #666;
    border-top: 1px solid #e0e0e0;
  }

  .step-indicator {
    display: flex;
    justify-content: space-between;
    margin-bottom: 24px;
    text-align: center;
  }

  .step {
    flex: 1;
    font-size: 12px;
    color: #999;
  }

  .step.active {
    color: #667eea;
    font-weight: 600;
  }

  .step::before {
    content: "";
    display: block;
    width: 32px;
    height: 32px;
    background: #e0e0e0;
    border-radius: 50%;
    margin: 0 auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    color: #999;
  }

  .step.active::before {
    background: #667eea;
    color: #fff;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>💳 Deposit Funds</h1>
    <p>Add money to your account</p>
  </div>

  <div class="content">
    <div class="step-indicator">
      <div class="step active">Enter Details</div>
      <div class="step">Review</div>
      <div class="step">Confirm</div>
    </div>

    <div class="info-box">
      ℹ️ Fill in your deposit details below and we'll guide you through the payment process.
    </div>

    <form id="depositForm" onsubmit="handleSubmit(event)">
      <!-- Amount Input -->
      <div class="form-group">
        <label for="amount">Deposit Amount (UGX)</label>
        <div class="input-icon amount-input">
          <input 
            type="number" 
            id="amount" 
            name="amount"
            placeholder="Enter amount (minimum 5,000)" 
            min="5000" 
            step="1000"
            required
          >
        </div>
        <div class="error" id="amountError"></div>
      </div>

      <!-- Phone Number Input -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <div class="input-icon phone-input">
          <input 
            type="tel" 
            id="phone" 
            name="phone"
            placeholder="e.g., 256780194414" 
            required
          >
        </div>
        <div class="error" id="phoneError"></div>
      </div>

      <!-- Payment Method -->
      <div class="form-group">
        <label for="method">Payment Method</label>
        <div class="input-icon method-input">
          <select id="method" name="method" required>
            <option value="">-- Select Payment Method --</option>
            <option value="mtn">MTN Mobile Money</option>
            <option value="equity">Equity Bank</option>
          </select>
        </div>
        <div class="error" id="methodError"></div>
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button type="button" class="btn btn-secondary" onclick="goBack()">Cancel</button>
        <button type="submit" class="btn btn-primary">Continue →</button>
      </div>
      
      <div class="success" id="successMessage"></div>
    </form>
  </div>

  <div class="footer">
    <p>🔒 Your information is secure and encrypted</p>
  </div>
</div>

<script>
// Form validation and submission
function handleSubmit(event) {
  event.preventDefault();

  // Get form values
  const amount = document.getElementById('amount').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const method = document.getElementById('method').value;

  // Clear previous errors
  clearErrors();

  // Validation
  let isValid = true;

  // Validate amount
  if (!amount || amount < 5000) {
    showError('amountError', 'Minimum deposit is UGX 5,000');
    isValid = false;
  }

  // Validate phone number
  if (!phone) {
    showError('phoneError', 'Phone number is required');
    isValid = false;
  } else if (!/^\d{10,15}$/.test(phone.replace(/\D/g, ''))) {
    showError('phoneError', 'Please enter a valid phone number');
    isValid = false;
  }

  // Validate method
  if (!method) {
    showError('methodError', 'Please select a payment method');
    isValid = false;
  }

  if (isValid) {
    // Store deposit info in sessionStorage for next page
    const depositData = {
      amount: amount,
      phone: phone,
      method: method,
      timestamp: new Date().toISOString()
    };

    sessionStorage.setItem('depositData', JSON.stringify(depositData));

    // Redirect to payment instructions page
    window.location.href = 'payment.html';
  }
}

function showError(elementId, message) {
  const errorElement = document.getElementById(elementId);
  errorElement.textContent = message;
  errorElement.style.display = 'block';
  errorElement.parentElement.querySelector('input, select').style.borderColor = '#dc2626';
}

function clearErrors() {
  document.querySelectorAll('.error').forEach(el => {
    el.style.display = 'none';
    el.textContent = '';
  });
  document.querySelectorAll('input, select').forEach(el => {
    el.style.borderColor = '#e0e0e0';
  });
}

function goBack() {
  // Go back to previous page or home
  window.history.back();
}

// Format phone number on input
document.getElementById('phone').addEventListener('input', function(e) {
  let value = e.target.value.replace(/\D/g, '');
  if (value.length > 15) {
    value = value.slice(0, 15);
  }
  e.target.value = value;
});

// Format amount with commas for display
document.getElementById('amount').addEventListener('input', function(e) {
  let value = e.target.value;
  if (value && parseInt(value) > 0) {
    document.querySelector('.info-box').innerHTML = 
      `✅ Amount: UGX ${parseInt(value).toLocaleString()}`;
  }
});
</script>

</body>
</html>
