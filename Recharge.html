<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge - EXPO INVESTMENT</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f7fa; }
    
    .header {
        background: white; padding: 15px 16px; display: flex; align-items: center;
        border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10;
    }
    .back { font-size: 24px; text-decoration: none; color: #111; margin-right: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    
    .container { padding: 20px 16px; }
    .card {
        background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .card h3 { margin: 0 0 12px; font-size: 15px; color: #111; }
    
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .input-group input {
        width: 100%; padding: 14px; border: 2px solid #e5e7eb;
        border-radius: 8px; font-size: 16px;
    }
    .input-group input:focus { outline: none; border-color: #3b82f6; }
    
    .method-selector {
        display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }
    .method {
        border: 2px solid #e5e7eb; border-radius: 12px; padding: 16px;
        text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .method.active { border-color: #3b82f6; background: #eff6ff; }
    .method img { width: 40px; height: 40px; margin-bottom: 8px; }
    .method-name { font-size: 14px; font-weight: 600; color: #111; }
    
    .btn {
        width: 100%; padding: 14px; background: #3b82f6; color: white;
        border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
        cursor: pointer; transition: opacity 0.2s;
    }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn:active { opacity: 0.8; }
    
    .note { font-size: 12px; color: #64748b; margin-top: 12px; text-align: center; }
    .error { color: #dc2626; font-size: 12px; margin-top: 6px; display: none; }
</style>
</head>
<body>

<div class="header">
    <a href="home.html" class="back">←</a>
    <h1>Recharge</h1>
</div>

<div class="container">
    <div class="card">
        <h3>Select Mobile Money</h3>
        <div class="method-selector">
            <div class="method active" data-method="mtn" onclick="selectMethod('mtn')">
                <div style="font-size: 32px;">📱</div>
                <div class="method-name">MTN MoMo</div>
            </div>
            <div class="method" data-method="airtel" onclick="selectMethod('airtel')">
                <div style="font-size: 32px;">📱</div>
                <div class="method-name">Airtel Money</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="tel" id="phone" placeholder="0771234567" maxlength="10">
            <div class="error" id="phoneError">Enter a valid 10-digit number starting with 0</div>
        </div>
        
        <div class="input-group">
            <label>Amount (UGX)</label>
            <input type="number" id="amount" placeholder="Minimum 1000" min="1000">
            <div class="error" id="amountError">Minimum amount is UGX 1000</div>
        </div>
    </div>

    <button class="btn" id="payBtn" onclick="initiatePayment()">Pay Now</button>
   <div id="txnIdDiv" style="display:none; margin-top:15px;">
  <p>After paying, enter the M##### transaction ID from the MTN SMS:</p>
  <input type="text" id="txnId" placeholder="M12345678" style="width:100%; padding:10px;">
  <button onclick="confirmPayment()" style="margin-top:10px; width:100%;">I Paid</button>
   </div>
    <p class="note">You will receive a prompt on your phone to confirm payment</p>
</div>

<script>
const PAYMENT_API_URL = 'https://your-backend.com/api/pay'; // CHANGE THIS

let selectedMethod = 'mtn';

function selectMethod(method) {
    selectedMethod = method;
    document.querySelectorAll('.method').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-method="${method}"]`).classList.add('active');
}

function validateForm() {
    let valid = true;
    const phone = document.getElementById('phone').value.trim();
    const amount = document.getElementById('amount').value.trim();
    
    // Reset errors
    document.getElementById('phoneError').style.display = 'none';
    document.getElementById('amountError').style.display = 'none';
    
    if (!/^0[0-9]{9}$/.test(phone)) {
        document.getElementById('phoneError').style.display = 'block';
        valid = false;
    }
    
    if (!amount || amount < 1000) {
        document.getElementById('amountError').style.display = 'block';
        valid = false;
    }
    
    return valid;
}

async function initiatePayment() {
    const phone = document.getElementById('phone').value;
    const amount = document.getElementById('amount').value;

    if (!phone || !amount) {
        alert('Enter phone and amount');
        return;
    }
    alert(`Pay ${amount} UGX to 0780194414 using *165*1*1#\n\nAfter payment, enter the M##### transaction ID to confirm.`);
    document.getElementById('txnIdDiv').style.display = 'block';
}

function confirmPayment() {
    const txnId = document.getElementById('txnId').value;
    const amount = document.getElementById('amount').value;
    
    if (!txnId.startsWith('M') || txnId.length < 8) {
        alert('Enter a valid MTN transaction ID');
        return;
    }
    
    alert(`Payment ${txnId} submitted. We’ll credit ${amount} UGX after verification.`);
    
    document.getElementById('txnIdDiv').style.display = 'none';
    document.getElementById('txnId').value = '';
   }
    
    
    
    // Uncomment this line when you want to auto-credit after testing:
    // loadBalance(parseInt(amount));
   }
