<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 5px;
        }
        h1 {
            color: #333;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        select, input[type="number"], button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<h1>Recharge Payment</h1>
<form id="rechargeForm">
    <label for="country">Select Country:</label>
    <select id="country" name="country" required>
        <option value="Kenya">Kenya</option>
        <option value="Uganda">Uganda</option>
        <option value="Tanzania">Tanzania</option>
        <option value="Rwanda">Rwanda</option>
        <option value="Burundi">Burundi</option>
        <option value="South Sudan">South Sudan</option>
    </select>

    <label for="amount">Enter Amount:</label>
    <input type="number" id="amount" name="amount" min="1" required>

    <button type="submit">Recharge</button>
</form>

<script>
    document.getElementById('rechargeForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const country = document.getElementById('country').value;
        const amount = document.getElementById('amount').value;

        // Simulate payment processing
        alert(`Processing payment of ${amount} for ${country}.`);
        
        // Here you would integrate with your payment processing logic
    });
</script>

</body>
</html>
