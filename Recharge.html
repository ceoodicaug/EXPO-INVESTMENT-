<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recharge System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
}

h2 { text-align:center; }

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
}

button {
    background: green;
    color: white;
    border: none;
    font-weight: bold;
}

.status {
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#333;
}

.note {
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">
    <h2>Recharge Account</h2>

    <!-- PHONE INSTEAD OF NAME -->
    <input type="text" id="phone" placeholder="Phone Number (e.g. +2567xxxxxxx)" required>

    <!-- COUNTRY SELECT -->
    <select id="country" onchange="updatePaymentInfo()">
        <option value="">Select Country</option>
        <option value="UG">Uganda 🇺🇬</option>
        <option value="KE">Kenya 🇰🇪</option>
        <option value="TZ">Tanzania 🇹🇿</option>
        <option value="RW">Rwanda 🇷🇼</option>
        <option value="BI">Burundi 🇧🇮</option>
        <option value="SS">South Sudan 🇸🇸</option>
    </select>

    <input type="email" id="email" placeholder="Email Address">
    <input type="number" id="amount" placeholder="Enter Amount">

    <button onclick="payNow()">Submit Payment</button>

    <div class="status" id="status"></div>

    <div class="note" id="paymentInfo"></div>
</div>

<script>
function updatePaymentInfo() {
    const country = document.getElementById("country").value;
    let msg = "";

    switch(country) {
        case "UG":
            msg = "Send money via MTN/Airtel to +256780194414";
            break;
        case "KE":
            msg = "Send via M-Pesa to Paybill/Till (to be configured)";
            break;
        case "TZ":
            msg = "Send via TigoPesa/Airtel Money (to be configured)";
            break;
        case "RW":
            msg = "Send via MTN Mobile Money Rwanda";
            break;
        case "BI":
            msg = "Send via Lumicash or Econet Leo";
            break;
        case "SS":
            msg = "Send via M-Gurush or Airtel Money";
            break;
    }

    document.getElementById("paymentInfo").innerText = msg;
}

async function payNow() {

    const phone = document.getElementById("phone").value;
    const country = document.getElementById("country").value;
    const email = document.getElementById("email").value;
    const amount = document.getElementById("amount").value;

    if (!phone || !country || !amount) {
        alert("Fill all required fields");
        return;
    }

    document.getElementById("status").innerText =
        "Processing manual payment request...";

    // send to backend (optional future upgrade)
    try {
        await fetch("YOUR_BACKEND_URL/manual-deposit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                phone,
                country,
                email,
                amount
            })
        });
    } catch (e) {
        console.log("Backend not connected yet");
    }

    document.getElementById("status").innerText =
        "Send payment manually using instructions above. Admin will verify.";
}
</script>

</body>
</html>
