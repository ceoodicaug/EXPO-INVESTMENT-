<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO INVESTMENT - Recharge</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    background:#0066ff;
    color:green;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#message{
    margin-top:15px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>Recharge Account</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="method">
    <option value="MOBILE_MONEY">Mobile Money</option>
    <option value="MPESA">M-Pesa</option>
    <option value="AIRTEL">Airtel Money</option>
    <option value="MTN">MTN MoMo</option>
</select>

<button onclick="startDeposit()">
Deposit Now
</button>

<div id="message"></div>

</div>

<script>

async function startDeposit(){

const countrySelect = document.getElementById("country_code");
const phoneInput = document.getElementById("phone");

// Map country codes → ISO dialing codes
const dialMap = {
  "256": "+256", // Uganda
  "254": "+254", // Kenya
  "255": "+255", // Tanzania
  "250": "+250", // Rwanda
  "257": "+257", // Burundi
  "211": "+211", // South Sudan
  "251": "+251", // Ethiopia
  "252": "+252", // Somalia
  "253": "+253", // Djibouti
  "291": "+291", // Eritrea
  "234": "+234", // Nigeria
  "233": "+233", // Ghana
  "243": "+243", // Congo DRC
  "242": "+242"  // Congo Brazzaville
};

phoneInput.addEventListener("input", function () {
  let value = phoneInput.value.replace(/\D/g, ""); // remove non-numbers

  // Check first 3 digits (country code length)
  let detectedCode = value.substring(0, 3);

  if (dialMap[detectedCode]) {
    countrySelect.value = dialMap[detectedCode];
  }
});
</script>

</body>
</html>
