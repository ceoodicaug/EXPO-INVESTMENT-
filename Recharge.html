<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge Account</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.deposit-box{
    background:#eef7ff;
    border:1px solid #bcdcff;
    padding:15px;
    border-radius:8px;
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.notice{
    margin-top:15px;
    text-align:center;
    color:#666;
}
</style>
</head>

<body>

<div class="container">
    <h2>Recharge Account</h2>

    <div class="deposit-box">
        Send money then submit details below
    </div>

    <form id="depositForm">
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="number" id="amount" placeholder="Amount" required>
        <input type="text" id="transactionId" placeholder="Transaction ID" required>

        <button type="submit">Submit Deposit</button>
    </form>

    <div class="notice">
        Deposits will be approved by admin.
    </div>
</div>

<script>
const SUPABASE_URL = "https://ueylvupimetgerzlygco.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVleWx2dXBpbWV0Z2Vyemx5Z2NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNTM1ODcsImV4cCI6MjA5NDgyOTU4N30.CTEaSvrZSamMIP7ZsJHPffAglkkUZTRPtb2y7DydQkU";

const form = document.getElementById("depositForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const depositData = {
        phone: document.getElementById("phone").value,
        amount: Number(document.getElementById("amount").value),
        transaction_id: document.getElementById("transactionId").value,
        status: "pending"
    };

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/deposits`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "Prefer": "return=representation"
            },
            body: JSON.stringify(depositData)
        });

        const data = await response.json();

        if (!response.ok) {
            console.error(data);
            alert("Error: " + (data.message || "Deposit failed"));
            return;
        }

        alert("Deposit submitted successfully!");
        form.reset();

    } catch (err) {
        console.error(err);
        alert("Network error. Check Supabase connection.");
    }
});
</script>

</body>
</html>
