<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - EXPO INVESTMENT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #f1f5f9;
    margin: 0;
    padding: 20px;
}

.header {
    background: #1e293b;
    color: white;
    padding: 15px;
    border-radius: 10px;
}

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h3 {
    margin-top: 0;
}

.item {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
}

button {
    margin-right: 5px;
    padding: 6px 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.approve {
    background: #16a34a;
    color: white;
}

.reject {
    background: #dc2626;
    color: white;
}

.logout {
    margin-top: 15px;
    background: #334155;
    color: white;
    padding: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h2>EXPO INVESTMENT ADMIN PANEL</h2>
    <p>Approve Deposits & Withdrawals</p>
</div>

<div class="container">

    <!-- DEPOSITS -->
    <div class="card">
        <h3>Pending Deposits</h3>
        <div id="deposits"></div>
    </div>

    <!-- WITHDRAWALS -->
    <div class="card">
        <h3>Pending Withdrawals</h3>
        <div id="withdrawals"></div>
    </div>

</div>

<button class="logout" onclick="logout()">Logout</button>

<script>
// protect page
if (localStorage.getItem("admin") !== "true") {
    window.location.href = "admin-login.html";
}

// sample fake data (replace with backend later)
let deposits = [
    {id: 1, user: "John Doe", amount: 50},
    {id: 2, user: "Mary Jane", amount: 100}
];

let withdrawals = [
    {id: 1, user: "Alex", amount: 30},
    {id: 2, user: "Peter", amount: 80}
];

function loadData() {
    const depDiv = document.getElementById("deposits");
    const witDiv = document.getElementById("withdrawals");

    depDiv.innerHTML = "";
    witDiv.innerHTML = "";

    deposits.forEach(d => {
        depDiv.innerHTML += `
            <div class="item">
                <b>${d.user}</b><br>
                Deposit: $${d.amount}<br>
                <button class="approve" onclick="approveDeposit(${d.id})">Approve</button>
                <button class="reject" onclick="rejectDeposit(${d.id})">Reject</button>
            </div>
        `;
    });

    withdrawals.forEach(w => {
        witDiv.innerHTML += `
            <div class="item">
                <b>${w.user}</b><br>
                Withdraw: $${w.amount}<br>
                <button class="approve" onclick="approveWithdraw(${w.id})">Approve</button>
                <button class="reject" onclick="rejectWithdraw(${w.id})">Reject</button>
            </div>
        `;
    });
}

function approveDeposit(id) {
    deposits = deposits.filter(d => d.id !== id);
    alert("Deposit approved");
    loadData();
}

function rejectDeposit(id) {
    deposits = deposits.filter(d => d.id !== id);
    alert("Deposit rejected");
    loadData();
}

function approveWithdraw(id) {
    withdrawals = withdrawals.filter(w => w.id !== id);
    alert("Withdrawal approved");
    loadData();
}

function rejectWithdraw(id) {
    withdrawals = withdrawals.filter(w => w.id !== id);
    alert("Withdrawal rejected");
    loadData();
}

function logout() {
    localStorage.removeItem("admin");
    window.location.href = "admin-login.html";
}

loadData();
</script>

</body>
</html>
