<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - EXPO Investment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .login-container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 450px;
    width: 100%;
    overflow: hidden;
  }

  .login-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 40px 20px;
    text-align: center;
  }

  .login-header h1 {
    font-size: 28px;
    margin-bottom: 8px;
    font-weight: 700;
  }

  .login-header p {
    font-size: 14px;
    opacity: 0.9;
  }

  .login-body {
    padding: 40px 30px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.3s ease;
  }

  .form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .form-group input::placeholder {
    color: #999;
  }

  .remember-forgot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
  }

  .remember-forgot label {
    display: flex;
    align-items: center;
    margin: 0;
  }

  .remember-forgot input[type="checkbox"] {
    width: auto;
    margin-right: 6px;
  }

  .remember-forgot a {
    color: #667eea;
    text-decoration: none;
  }

  .remember-forgot a:hover {
    text-decoration: underline;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error-message {
    background: #fee2e2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
    font-size: 13px;
  }

  .success-message {
    background: #d1fae5;
    border: 1px solid #a7f3d0;
    color: #065f46;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
    font-size: 13px;
  }

  .loading {
    display: none;
    text-align: center;
    font-size: 13px;
    color: #667eea;
    margin-bottom: 16px;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #f3f3f3;
    border-top: 2px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 8px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .demo-credentials {
    background: #f0f4ff;
    border-left: 4px solid #667eea;
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 12px;
    color: #555;
  }

  .demo-credentials strong {
    display: block;
    color: #667eea;
    margin-bottom: 6px;
  }

  .demo-credentials p {
    margin-bottom: 4px;
  }

  .back-link {
    text-align: center;
    margin-top: 20px;
  }

  .back-link a {
    color: #667eea;
    text-decoration: none;
    font-size: 13px;
  }

  .back-link a:hover {
    text-decoration: underline;
  }

  @media (max-width: 480px) {
    .login-container {
      border-radius: 12px;
    }

    .login-header {
      padding: 30px 20px;
    }

    .login-header h1 {
      font-size: 24px;
    }

    .login-body {
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <h1>⚙️ Admin Login</h1>
    <p>EXPO Investment Management</p>
  </div>

  <div class="login-body">
    <!-- Messages -->
    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <!-- Demo Credentials Info -->
    <div class="demo-credentials">
      <strong>Demo Credentials:</strong>
      <p>📧 Email: expoinvestment@gmail.com</p>
      <p>🔐 Password: 0306200</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          placeholder="Enter your email" 
          required
          autocomplete="email"
        >
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          placeholder="Enter your password" 
          required
          autocomplete="current-password"
        >
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
        <a href="#" onclick="showForgotPassword(event)">Forgot password?</a>
      </div>

      <!-- Loading Indicator -->
      <div class="loading" id="loading">
        <span class="spinner"></span>
        Verifying credentials...
      </div>

      <!-- Login Button -->
      <button type="submit" class="login-btn" id="loginBtn">Login to Dashboard</button>
    </form>

    <!-- Back Link -->
    <div class="back-link">
      <a href="index.html">← Back to Home</a>
    </div>
  </div>
</div>

<script>
// Hardcoded admin credentials
const ADMIN_CREDENTIALS = {
  email: 'expoinvestment@gmail.com',
  password: '0306200'
};

// Check if already logged in
window.addEventListener('load', () => {
  if (localStorage.getItem('adminLoggedIn')) {
    window.location.href = 'admin-dashboard.html';
  }

  // Load remembered email if available
  const rememberedEmail = localStorage.getItem('adminRememberedEmail');
  if (rememberedEmail) {
    document.getElementById('email').value = rememberedEmail;
    document.getElementById('rememberMe').checked = true;
  }
});

function handleLogin(event) {
  event.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const rememberMe = document.getElementById('rememberMe').checked;

  // Clear messages
  clearMessages();

  // Show loading
  showLoading(true);

  // Simulate API call delay
  setTimeout(() => {
    // Validate credentials
    if (email === ADMIN_CREDENTIALS.email && password === ADMIN_CREDENTIALS.password) {
      // Credentials correct
      showLoading(false);

      // Show success message
      showSuccess('✅ Login successful! Redirecting...');

      // Store login session
      localStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminEmail', email);

      // Remember email if checked
      if (rememberMe) {
        localStorage.setItem('adminRememberedEmail', email);
      } else {
        localStorage.removeItem('adminRememberedEmail');
      }

      // Redirect after 1.5 seconds
      setTimeout(() => {
        window.location.href = 'admin-dashboard.html';
      }, 1500);
    } else {
      // Credentials incorrect
      showLoading(false);
      showError('❌ Invalid email or password. Please try again.');
      
      // Clear password field
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }, 1500);
}

function showLoading(show) {
  const loading = document.getElementById('loading');
  const btn = document.getElementById('loginBtn');
  
  if (show) {
    loading.style.display = 'block';
    btn.disabled = true;
  } else {
    loading.style.display = 'none';
    btn.disabled = false;
  }
}

function showError(message) {
  const errorEl = document.getElementById('errorMessage');
  errorEl.innerText = message;
  errorEl.style.display = 'block';
}

function showSuccess(message) {
  const successEl = document.getElementById('successMessage');
  successEl.innerText = message;
  successEl.style.display = 'block';
}

function clearMessages() {
  document.getElementById('errorMessage').style.display = 'none';
  document.getElementById('successMessage').style.display = 'none';
}

function showForgotPassword(event) {
  event.preventDefault();
  alert('To reset your password, please contact the system administrator.');
}

// Allow Enter key to submit form
document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  }
});

// Auto-fill demo credentials for testing
function autofillDemo() {
  document.getElementById('email').value = ADMIN_CREDENTIALS.email;
  document.getElementById('password').value = ADMIN_CREDENTIALS.password;
}

// Allow quick login with keyboard shortcut (Ctrl+D)
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'd') {
    autofillDemo();
  }
});
</script>

</body>
</html>
