<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:25px;
    border-radius:10px;
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.msg{
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Admin Registration</h2>

    <input type="text" id="name" placeholder="Admin Name">
    <input type="email" id="email" placeholder="Admin Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="registerAdmin()">Register Admin</button>

    <div class="msg" id="msg"></div>
</div>

<script>
function registerAdmin(){

    let admin = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    localStorage.setItem("adminAccount", JSON.stringify(admin));

    document.getElementById("msg").innerHTML =
    "✅ Admin account created successfully";

    setTimeout(()=>{
        window.location.href="admin-login.html";
    },1500);
}
</script>

</body>
</html>
