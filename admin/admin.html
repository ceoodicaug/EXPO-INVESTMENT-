<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.login-box{
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    background:#0f172a;
    color:white;
    padding:20px;
}

.sidebar h2{
    text-align:center;
}

.sidebar div{
    padding:10px;
    cursor:pointer;
}

.main{
    margin-left:240px;
    padding:20px;
}

.section{
    background:white;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#2563eb;
    color:white;
}

.btn{
    padding:6px 10px;
    border:none;
    cursor:pointer;
    color:white;
}

.approve{background:green;}
.reject{background:red;}

.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
    <h2>Admin Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="sidebar">
<h2>ADMIN</h2>
<div onclick="loadUsers()">Users</div>
<div onclick="loadDeposits()">Deposits</div>
<div onclick="loadWithdrawals()">Withdrawals</div>
<div onclick="logout()">Logout</div>
</div>

<div class="main">

<h1>Secure Admin Dashboard</h1>

<div class="section">
<h2>Data</h2>
<div id="content">Loading...</div>
</div>

</div>
</div>

<script>

let token = localStorage.getItem("token");

// 🔐 LOGIN
function login(){
    fetch("http://localhost:3000/api/admin/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:document.getElementById("username").value,
            password:document.getElementById("password").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.token){
            localStorage.setItem("token",data.token);
            token = data.token;
            showDashboard();
        }else{
            alert("Login failed");
        }
    });
}

// SHOW DASHBOARD
function showDashboard(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadUsers();
}

// 🔐 FETCH USERS
function loadUsers(){
    fetch("http://localhost:3000/api/admin/users",{
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>res.json())
    .then(data=>{
        let html = "<h3>Users</h3><table><tr><th>ID</th><th>Name</th><th>Balance</th></tr>";

        data.forEach(u=>{
            html += `<tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.balance}</td>
            </tr>`;
        });

        html += "</table>";
        document.getElementById("content").innerHTML = html;
    });
}

// 💰 DEPOSITS
function loadDeposits(){
    fetch("http://localhost:3000/api/admin/deposits",{
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>res.json())
    .then(data=>{
        let html = "<h3>Deposits</h3><table>
        <tr><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr>";

        data.forEach(d=>{
            html += `<tr>
                <td>${d.user_id}</td>
                <td>${d.amount}</td>
                <td>${d.status}</td>
                <td>
                    <button class='btn approve' onclick='approveDeposit(${d.id})'>Approve</button>
                </td>
            </tr>`;
        });

        html += "</table>";
        document.getElementById("content").innerHTML = html;
    });
}

// APPROVE DEPOSIT
function approveDeposit(id){
    fetch("http://localhost:3000/api/admin/deposits/approve/"+id,{
        method:"POST",
        headers:{Authorization:"Bearer "+token}
    }).then(()=>loadDeposits());
}

// 💸 WITHDRAWALS
function loadWithdrawals(){
    fetch("http://localhost:3000/api/admin/withdrawals",{
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>res.json())
    .then(data=>{
        let html = "<h3>Withdrawals</h3><table>
        <tr><th>User</th><th>Amount</th><th>Status</th><th>Action</th></tr>";

        data.forEach(w=>{
            html += `<tr>
                <td>${w.user_id}</td>
                <td>${w.amount}</td>
                <td>${w.status}</td>
                <td>
                    <button class='btn approve' onclick='approveWithdrawal(${w.id})'>Approve</button>
                </td>
            </tr>`;
        });

        html += "</table>";
        document.getElementById("content").innerHTML = html;
    });
}

// APPROVE WITHDRAWAL
function approveWithdrawal(id){
    fetch("http://localhost:3000/api/admin/withdrawals/approve/"+id,{
        method:"POST",
        headers:{Authorization:"Bearer "+token}
    }).then(()=>loadWithdrawals());
}

// LOGOUT
function logout(){
    localStorage.removeItem("token");
    location.reload();
}

// AUTO CHECK LOGIN
if(token){
    showDashboard();
}

</script>

</body>
</html>
