<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO Investment Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:0;}
.header{background:#0d6efd;color:white;padding:15px;text-align:center;}
.container{padding:20px;}
.card{background:white;padding:20px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
button{background:#0d6efd;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;margin:5px;}
button:hover{background:#084298;}
table{width:100%;border-collapse:collapse;}
table th, table td{padding:10px;border:1px solid #ddd;text-align:left;}
#loginForm{text-align:center;margin-top:50px;}
#loginForm input{padding:10px;margin:5px;width:250px;}
</style>
</head>
<body>

<div id="loginForm">
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Enter your email"><br>
<input type="password" id="password" placeholder="Enter your password"><br>
<button onclick="loginAdmin()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
<div class="header">
<h1>EXPO Investment Admin Dashboard</h1>
<button onclick="logoutAdmin()" style="float:right;margin-right:20px;">Logout</button>
</div>

<div class="container">

<div class="card">
<h2>Statistics</h2>
<p>Total Users: <span id="users">0</span></p>
<p>Pending Deposits: <span id="deposits">0</span></p>
<p>Pending Withdrawals: <span id="withdrawals">0</span></p>
</div>

<div class="card">
<h2>Pending Deposits</h2>
<table>
<thead>
<tr>
<th>User</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="depositTable"></tbody>
</table>
</div>

<div class="card">
<h2>Pending Withdrawals</h2>
<table>
<thead>
<tr>
<th>User</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="withdrawTable"></tbody>
</table>
</div>

</div>

<script>
// --- Supabase connection ---
const supabaseUrl = 'https://ueylvupimetgerzlygco.supabase.co';
const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'; // Replace with your anon key
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

const ADMIN_EMAIL = 'expoinvestiment@gmail.com';

// --- Login ---
async function loginAdmin(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById('loginMsg').innerText = error.message;
  } else if(email.toLowerCase() !== ADMIN_EMAIL){
    document.getElementById('loginMsg').innerText = "You are not authorized!";
    await supabase.auth.signOut();
  } else {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    setupDashboard();
  }
}

// --- Logout ---
async function logoutAdmin(){
  await supabase.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

// --- Setup dashboard after login ---
async function setupDashboard(){
  loadStats();

  // Real-time subscriptions
  supabase.channel('realtime-deposits')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'deposits'}, payload=>{
      loadStats();
    })
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'deposits'}, payload=>{
      loadStats();
    })
    .subscribe();

  supabase.channel('realtime-withdrawals')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'withdrawals'}, payload=>{
      loadStats();
    })
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'withdrawals'}, payload=>{
      loadStats();
    })
    .subscribe();
}

// --- Load statistics and tables ---
async function loadStats(){
  const { data: users } = await supabase.from('users').select('*');
  const { data: deposits } = await supabase.from('deposits').select('*').eq('status','pending');
  const { data: withdrawals } = await supabase.from('withdrawals').select('*').eq('status','pending');

  document.getElementById('users').innerText = users.length;
  document.getElementById('deposits').innerText = deposits.length;
  document.getElementById('withdrawals').innerText = withdrawals.length;

  loadDeposits(deposits);
  loadWithdrawals(withdrawals);
}

// --- Populate deposits table ---
function loadDeposits(deposits){
  const table = document.getElementById('depositTable');
  table.innerHTML = '';
  deposits.forEach(d=>{
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${d.user_email}</td>
      <td>$${d.amount}</td>
      <td>
        <button onclick="approveDeposit('${d.id}')">Approve</button>
        <button onclick="rejectDeposit('${d.id}')">Reject</button>
      </td>
    `;
    table.appendChild(row);
  });
}

// --- Populate withdrawals table ---
function loadWithdrawals(withdrawals){
  const table = document.getElementById('withdrawTable');
  table.innerHTML = '';
  withdrawals.forEach(w=>{
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${w.user_email}</td>
      <td>$${w.amount}</td>
      <td>
        <button onclick="approveWithdrawal('${w.id}')">Approve</button>
        <button onclick="rejectWithdrawal('${w.id}')">Reject</button>
      </td>
    `;
    table.appendChild(row);
  });
}

// --- Approve/Reject functions ---
async function approveDeposit(id){
  await supabase.from('deposits').update({status:'approved'}).eq('id',id);
}

async function rejectDeposit(id){
  await supabase.from('deposits').update({status:'rejected'}).eq('id',id);
}

async function approveWithdrawal(id){
  await supabase.from('withdrawals').update({status:'approved'}).eq('id',id);
}

async function rejectWithdrawal(id){
  await supabase.from('withdrawals').update({status:'rejected'}).eq('id',id);
}
</script>

</body>
</html>
