<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO INVESTMENT - Home</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { background: #f5f7fa; padding-bottom: 60px; }
    
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 16px;
        background: white;
    }
    .header-left { font-size: 16px; font-weight: 600; color: #111; }
    .header-right { display: flex; align-items: center; gap: 8px; color: #3b82f6; font-size: 14px; }
    .reward-badge {
        background: #fbbf24;
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
    }
    
    .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: white;
    }
    .avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: #3b82f6; color: white;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700;
    }
    .username { font-weight: 600; color: #111; }
    
    .banner {
        margin: 12px 16px;
        background: linear-gradient(90deg, #1e3a8a, #3b82f6);
        color: white;
        border-radius: 12px;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }
    .banner h2 { font-size: 18px; margin-bottom: 4px; }
    .banner p { font-size: 13px; opacity: 0.9; }
    .banner .tag { font-size: 12px; opacity: 0.8; margin-top: 8px; }
    .banner .circle {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 60px; height: 60px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: 700;
    }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        padding: 16px;
        background: white;
    }
    .grid-item {
        text-align: center;
        font-size: 12px;
        color: #374151;
    }
    .grid-icon {
        width: 48px; height: 48px; margin: 0 auto 6px;
        border-radius: 12px; display: flex; align-items: center; justify-content: center;
        font-weight: 700; color: white;
    }
    .icon-blue { background: #3b82f6; }
    .icon-orange { background: #f59e0b; }
    .icon-lightblue { background: #60a5fa; }
    .icon-green { background: #10b981; }
    
    .balance-row {
        display: flex;
        gap: 12px;
        padding: 0 16px 16px;
    }
    .balance-card {
        flex: 1;
        padding: 16px;
        border-radius: 12px;
        color: white;
    }
    .balance-card.blue { background: #4f46e5; }
    .balance-card.teal { background: #06b6d4; }
    .balance-card .amount { font-size: 18px; font-weight: 700; }
    .balance-card .label { font-size: 12px; opacity: 0.9; margin-top: 4px; }
    
    .invest-banner {
        margin: 0 16px 16px;
        background: linear-gradient(90deg, #1e40af, #60a5fa);
        color: white;
        border-radius: 999px;
        padding: 14px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .invest-banner h3 { font-size: 15px; }
    .invest-banner p { font-size: 12px; opacity: 0.9; }
    
    .dynamic {
        background: white;
        padding: 16px;
    }
    .dynamic h4 {
        font-size: 15px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .dynamic h4::before {
        content: '';
        width: 3px; height: 16px;
        background: #3b82f6;
        border-radius: 2px;
    }
    .dynamic-item {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        font-size: 13px;
    }
    .dynamic-item .icon {
        width: 18px; height: 18px;
        background: #10b981;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .dynamic-item .text { color: #374151; }
    .dynamic-item .time { color: #9ca3af; font-size: 12px; margin-top: 2px; }
    
    /* Bottom Nav */
    .bottom-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 60px;
        background: white;
        display: flex;
        border-top: 1px solid #e5e7eb;
    }
    .nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #9ca3af;
        font-size: 11px;
    }
    .nav-item.active { color: #3b82f6; }
    .nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="header">
    <div class="header-left">Notify</div>
    <div class="header-right">
        <span>Welcor</span>
        <div class="reward-badge">Check-in reward</div>
    </div>
</
