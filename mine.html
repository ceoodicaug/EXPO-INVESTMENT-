<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO INVESTMENT - Mine</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f5f7fa;
padding:20px;
}

.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
font-size:18px;
}

.profile-card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#3b82f6;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
margin:auto;
margin-bottom:10px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

.balance{
font-size:28px;
font-weight:bold;
color:#10b981;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.logout{
background:#ef4444;
color:white;
}

.home{
background:#3b82f6;
color:white;
}

.info{
margin-top:10px;
font-size:14px;
color:#6b7280;
}
</style>
</head>

<body>

<a href="home.html" class="back">← Back</a>

<div class="profile-card">

<div class="avatar" id="avatar">
U
</div>

<h2 id="fullName">
User
</h2>

<div class="info" id="email">
user@email.com
</div>

</div>

<div class="card">

<h3>Available Balance</h3>

<div
class="balance"
id="balance">
UGX 0
</div>

</div>

<div class="card">

<h3>Account Information</h3>

<p class="info">
Status: Active
</p>

<p class="info">
Membership: Standard
</p>

<p class="info">
Platform: EXPO INVESTMENT
</p>

</div>

<button
class="home"
onclick="window.location.href='home.html'">
Go Home
</button>

<button
class="logout"
onclick="logout()">
Logout
</button>

<script>

if(!localStorage.getItem('isLoggedIn')){
window.location.href='index.html';
}

const user =
JSON.parse(
localStorage.getItem('user') || '{}'
);

const userId =
user.email || 'guest';

const balance =
Number(
localStorage.getItem(
'balance_' + userId
) || 0
);

document.getElementById(
'balance'
).textContent =
'UGX ' +
new Intl.NumberFormat()
.format(balance);

document.getElementById(
'fullName'
).textContent =
(user.firstName || '') +
' ' +
(user.lastName || '');

document.getElementById(
'email'
).textContent =
user.email || '';

document.getElementById(
'avatar'
).textContent =
(user.firstName || 'U')
.charAt(0)
.toUpperCase();

function logout(){

localStorage.removeItem(
'isLoggedIn'
);

localStorage.removeItem(
'user'
);

window.location.href =
'index.html';
}

</script>
<!-- Floating Movable Telegram Customer Service Button -->
<a href="https://t.me/expoug"
   target="_blank"
   rel="noopener noreferrer"
   id="supportBtn"
   class="customer-service">
    💬 Customer Service
</a>

<style>
.customer-service{
    position:fixed;
    bottom:100px;
    right:20px;
    background:linear-gradient(135deg,#0088cc,#00bfff);
    color:#fff;
    text-decoration:none;
    padding:14px 20px;
    border-radius:50px;
    font-size:16px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    z-index:999999;
    user-select:none;
    touch-action:none;
    animation:float 2s ease-in-out infinite;
    transition:transform .2s ease;
}

.customer-service:hover{
    transform:scale(1.05);
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}
</style>

<script>
const btn = document.getElementById("supportBtn");

let isDragging = false;
let moved = false;
let startX = 0;
let startY = 0;
let offsetX = 0;
let offsetY = 0;

function startDrag(e) {
    const touch = e.touches ? e.touches[0] : e;

    startX = touch.clientX;
    startY = touch.clientY;

    const rect = btn.getBoundingClientRect();

    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;

    isDragging = true;
    moved = false;

    document.addEventListener("mousemove", drag);
    document.addEventListener("touchmove", drag, { passive:false });

    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchend", stopDrag);
}

function drag(e) {
    if (!isDragging) return;

    const touch = e.touches ? e.touches[0] : e;

    const dx = Math.abs(touch.clientX - startX);
    const dy = Math.abs(touch.clientY - startY);

    if (dx > 10 || dy > 10) {
        moved = true;
    }

    if (moved) {
        btn.style.left = (touch.clientX - offsetX) + "px";
        btn.style.top = (touch.clientY - offsetY) + "px";
        btn.style.right = "auto";
        btn.style.bottom = "auto";

        e.preventDefault();
    }
}

function stopDrag() {
    isDragging = false;

    document.removeEventListener("mousemove", drag);
    document.removeEventListener("touchmove", drag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchend", stopDrag);
}

btn.addEventListener("mousedown", startDrag);
btn.addEventListener("touchstart", startDrag);

btn.addEventListener("click", function(e){
    if(moved){
        e.preventDefault();
        moved = false;
    }
});
</script>

</body>
</html>
