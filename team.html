<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPO INVESTMENT - Team</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#f5f7fa;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

h2{
margin-bottom:15px;
}

.stat{
font-size:28px;
font-weight:bold;
color:#3b82f6;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
font-weight:600;
}

.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<a href="home.html" class="back">← Back</a>

<div class="card">
<h2>Referral Team</h2>

<div class="stat" id="teamCount">0</div>

<p>Total Referrals</p>
</div>

<div class="card">

<h3>Your Referral Link</h3>

<input
type="text"
id="refLink"
readonly>

<button onclick="copyLink()">
Copy Referral Link
</button>

</div>

<div class="card">

<h3>Your Referral Code</h3>

<div
id="refCode"
style="
font-size:24px;
font-weight:bold;
color:#10b981;
margin-top:10px;
">
</div>

</div>

<script>

if(!localStorage.getItem('isLoggedIn')){
window.location.href='index.html';
}

const user =
JSON.parse(
localStorage.getItem('user')||'{}'
);

function generateCode(){

const email =
user.email || 'guest';

return btoa(email)
.replace(/=/g,'')
.substring(0,8)
.toUpperCase();
}

const code = generateCode();

document.getElementById(
'refCode'
).textContent = code;

const link =
window.location.origin +
window.location.pathname.replace(
'team.html',
'index.html'
) +
'?ref=' +
code;

document.getElementById(
'refLink'
).value = link;

function copyLink(){

navigator.clipboard
.writeText(link);

alert(
'Referral link copied'
);
}

const referrals =
JSON.parse(
localStorage.getItem(
'referrals_' + code
) || '[]'
);

document.getElementById(
'teamCount'
).textContent =
referrals.length;

</script>

</body>
</html>
